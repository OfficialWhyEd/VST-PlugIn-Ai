<script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- COMPONENTS ---

        const Header = ({ stats, aiStatus }) => (
            <header className="bg-[#131314] text-[#FFBF00] font-['Space_Grotesk'] uppercase tracking-widest text-xs docked full-width top-0 border-b border-[#FFBF00]/20 shadow-[0_0_20px_rgba(255,191,0,0.1)] flex justify-between items-center w-full px-6 py-3 z-50">
                <div className="flex items-center gap-6">
                    <h1 className="text-xl font-bold text-[#FFBF00] drop-shadow-[0_0_5px_rgba(255,191,0,0.5)] chromatic-aberration" data-text="MA_OS//CORE_TERMINAL">MA_OS//CORE_TERMINAL</h1>
                    <div className="flex gap-4 border-l border-[#FFBF00]/20 pl-6 h-4 items-center">
                        <span className="text-[#FFBF00]/60">SAMP_RATE:{stats.sampleRate}</span>
                        <span className="text-[#FFBF00]/60">BUFF_SIZE:{stats.bufferSize}</span>
                        <div className={`flex items-center gap-2 text-[#FFBF00] brightness-125 ${aiStatus === 'ACTIVE' ? 'animate-pulse' : 'opacity-50'}`}>
                            <div className={`w-1.5 h-1.5 rounded-full ${aiStatus === 'ACTIVE' ? 'bg-[#FFBF00]' : 'bg-red-500'}`}></div>
                            <span>AI_STATUS: {aiStatus}</span>
                        </div>
                    </div>
                </div>
                <div className="flex items-center gap-4">
                    <button className="hover:bg-[#FFBF00]/10 p-1"><span className="material-symbols-outlined">settings_input_component</span></button>
                    <button className="hover:bg-[#FFBF00]/10 p-1"><span className="material-symbols-outlined">terminal</span></button>
                    <button className="hover:bg-[#FFBF00]/10 p-1"><span className="material-symbols-outlined">power_settings_new</span></button>
                </div>
            </header>
        );

        const SideNav = () => (
            <nav className="bg-[#131314]/80 backdrop-blur-xl text-[#FFBF00] font-['Space_Grotesk'] text-[10px] tracking-tighter w-20 border-r border-outline-variant/30 flex flex-col items-center py-8 gap-12 z-40">
                <div className="flex flex-col items-center gap-1 opacity-80 mb-4">
                    <div className="w-8 h-8 bg-surface-container-high border border-primary/20 flex items-center justify-center">
                        <span className="material-symbols-outlined text-xs">memory</span>
                    </div>
                    <span className="text-[8px] uppercase">V4.02</span>
                </div>
                <div className="flex flex-col gap-8 items-center w-full">
                    <button className="bg-[#FFBF00] text-[#131314] w-full py-4 flex flex-col items-center gap-1">
                        <span className="material-symbols-outlined">waves</span>
                        <span className="font-bold">OSCILLATOR</span>
                    </button>
                    <button className="text-[#FFBF00] opacity-50 hover:opacity-100 hover:bg-[#2a2a2b] w-full py-4 flex flex-col items-center gap-1">
                        <span className="material-symbols-outlined">filter_list</span>
                        <span>ENVELOPE</span>
                    </button>
                    <button className="text-[#FFBF00] opacity-50 hover:opacity-100 hover:bg-[#2a2a2b] w-full py-4 flex flex-col items-center gap-1">
                        <span className="material-symbols-outlined">grid_on</span>
                        <span>MATRIX</span>
                    </button>
                    <button className="text-[#FFBF00] opacity-50 hover:opacity-100 hover:bg-[#2a2a2b] w-full py-4 flex flex-col items-center gap-1">
                        <span className="material-symbols-outlined">terminal</span>
                        <span>TERMINAL</span>
                    </button>
                </div>
            </nav>
        );

        const GainSlider = ({ value, onChange }) => {
            const handleMouseDown = (e) => {
                const startY = e.pageY;
                const startValue = value;
                
                const onMouseMove = (moveEvent) => {
                    const deltaY = startY - moveEvent.pageY;
                    const newValue = Math.min(24, Math.max(-24, startValue + (deltaY * 0.2)));
                    onChange(newValue);
                };
                
                const onMouseUp = () => {
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                };
                
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
            };

            const rotation = ((value + 24) / 48) * 270 - 135;

            return (
                <div className="relative group cursor-ns-resize select-none" onMouseDown={handleMouseDown}>
                    <svg className="drop-shadow-[0_0_15px_rgba(255,191,0,0.2)]" height="240" viewBox="0 0 100 100" width="240">
                        <circle cx="50" cy="50" fill="none" r="45" stroke="#2a2a2b" strokeWidth="8"></circle>
                        <circle 
                            cx="50" cy="50" fill="none" r="45" 
                            stroke="#FFBF00" 
                            strokeDasharray={`${((value + 24) / 48) * 210} 283`} 
                            strokeLinecap="butt" strokeWidth="8" 
                            transform="rotate(135 50 50)"
                            style={{ transition: 'stroke-dasharray 0.05s linear' }}
                        ></circle>
                        <circle cx="50" cy="50" fill="#131314" r="38"></circle>
                        <rect 
                            fill="#FFBF00" height="20" width="4" x="48" y="15"
                            transform={`rotate(${rotation} 50 50)`}
                            style={{ transition: 'transform 0.05s linear' }}
                        />
                        <g opacity="0.3" stroke="#FFBF00" strokeWidth="0.5">
                            {[-120, -60, 0, 60, 120].map(deg => (
                                <line key={deg} transform={`rotate(${deg} 50 50)`} x1="50" x2="50" y1="5" y2="10"></line>
                            ))}
                        </g>
                    </svg>
                    {value > 12 && (
                        <div className="absolute -top-4 -right-4 flex flex-col items-center">
                            <div className="w-3 h-3 bg-on-tertiary-fixed-variant rounded-full animate-pulse shadow-[0_0_8px_#92030f]"></div>
                            <span className="text-[8px] text-on-tertiary-fixed-variant font-bold mt-1">OVERLOAD</span>
                        </div>
                    )}
                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                        <span className="text-2xl font-bold text-primary crt-glow">{value.toFixed(1)}dB</span>
                    </div>
                </div>
            );
        };

        const ConsoleWindow = ({ logs }) => {
            const containerRef = useRef(null);

            useEffect(() => {
                if (containerRef.current) {
                    containerRef.current.scrollTop = containerRef.current.scrollHeight;
                }
            }, [logs]);

            return (
                <div className="mt-8 space-y-1 text-secondary text-[11px] opacity-90 font-mono overflow-y-auto max-h-[120px] pr-2" ref={containerRef}>
                    {logs.map((log, i) => (
                        <p key={i} className={log.type === 'error' ? 'text-on-tertiary-fixed-variant' : log.type === 'ai' ? 'text-secondary crt-glow' : 'text-primary/70'}>
                            {log.text}
                        </p>
                    ))}
                </div>
            );
        };

        const Visualizer = () => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrame;
                let offset = 0;

                const draw = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // Grid lines
                    ctx.strokeStyle = 'rgba(76, 227, 70, 0.1)';
                    ctx.lineWidth = 1;
                    for(let i = 0; i < canvas.height; i += 10) {
                        ctx.beginPath();
                        ctx.moveTo(0, i);
                        ctx.lineTo(canvas.width, i);
                        ctx.stroke();
                    }

                    // Oscilloscope path
                    ctx.beginPath();
                    ctx.strokeStyle = '#4ce346';
                    ctx.lineWidth = 1.5;
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#4ce346';

                    for (let x = 0; x < canvas.width; x++) {
                        const freq = 0.05;
                        const amp = 20;
                        const y = canvas.height/2 + 
                                  Math.sin(x * freq + offset) * amp + 
                                  Math.sin(x * freq * 2.1 + offset * 1.5) * (amp/2);
                        
                        if (x === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                    ctx.shadowBlur = 0;

                    offset += 0.1;
                    animationFrame = requestAnimationFrame(draw);
                };

                draw();
                return () => cancelAnimationFrame(animationFrame);
            }, []);

            return (
                <div className="mt-6 h-24 bg-surface-container border border-secondary/10 relative overflow-hidden">
                    <canvas ref={canvasRef} width="400" height="100" className="w-full h-full" />
                </div>
            );
        };

        const BootSequence = ({ onComplete }) => {
            const lines = [
                "MO_OS KERNEL LOADED...",
                "CHECKING DURANDAL_SUBSYSTEM...",
                "IO_BUFFER_INIT: OK",
                "WAVEFORM_GEN_V4: OK",
                "AI_CORE_HANDSHAKE: ACTIVE",
                "AUTHENTICATING USER: ADMIN_7",
                "ENTERING TERMINAL MODE..."
            ];

            return (
                <motion.div 
                    initial={{ opacity: 0 }} 
                    animate={{ opacity: 1 }} 
                    exit={{ opacity: 0 }}
                    className="fixed inset-0 bg-background z-[100] flex flex-col items-center justify-center p-20 font-mono text-[#FFBF00]"
                >
                    <div className="w-full max-w-md space-y-2">
                        {lines.map((line, i) => (
                            <motion.div
                                key={i}
                                initial={{ opacity: 0, x: -10 }}
                                animate={{ opacity: 1, x: 0 }}
                                transition={{ delay: i * 0.4 }}
                                onAnimationComplete={() => {
                                    if(i === lines.length - 1) setTimeout(onComplete, 1000);
                                }}
                            >
                                <span className="opacity-50 pr-4">[{i.toString().padStart(2, '0')}]</span>
                                {line}
                            </motion.div>
                        ))}
                        <motion.div 
                            animate={{ opacity: [1, 0] }}
                            transition={{ repeat: Infinity, duration: 0.5 }}
                            className="inline-block w-2 h-4 bg-[#FFBF00]"
                        />
                    </div>
                </motion.div>
            );
        };

        // --- MAIN APP ---

        const App = () => {
            const [isBooting, setIsBooting] = useState(true);
            const [gain, setGain] = useState(12.4);
            const [aiStatus, setAiStatus] = useState('ACTIVE');
            const [logs, setLogs] = useState([
                { text: 'Initializing CORE_AI v4.0.2...', type: 'system' },
                { text: 'Handshaking with Durandal_Subsystem...', type: 'system' },
                { text: 'DURANDAL_V4: ANALYZING SIGNAL...', type: 'ai' }
            ]);
            const [stats, setStats] = useState({ sampleRate: '44.1k', bufferSize: 256 });

            // Backend Communication Handler
            useEffect(() => {
                const handleBackendMessage = (event) => {
                    try {
                        // In WebView2, data might be in event.data as a string
                        const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                        
                        if (data.type === 'PARAM_UPDATE') {
                            if (data.key === 'gain') setGain(data.value);
                        } else if (data.type === 'LOG') {
                            setLogs(prev => [...prev, { text: data.message, type: data.logType || 'system' }]);
                        } else if (data.type === 'AI_STATE') {
                            setAiStatus(data.status);
                        }
                    } catch (e) {
                        console.error("Failed to parse backend message", e);
                    }
                };

                window.addEventListener('message', handleBackendMessage);
                return () => window.removeEventListener('message', handleBackendMessage);
            }, []);

            const updateGain = (newValue) => {
                setGain(newValue);
                // C++ Backend PostMessage
                if (window.chrome?.webview?.postMessage) {
                    window.chrome.webview.postMessage(JSON.stringify({ 
                        action: 'updateGain', 
                        value: newValue 
                    }));
                } else {
                    // Fallback log for dev
                    console.log("PostMessage:", { action: 'updateGain', value: newValue });
                }
            };

            if (isBooting) {
                return <BootSequence onComplete={() => setIsBooting(false)} />;
            }

            return (
                <motion.div 
                    initial={{ opacity: 0 }} 
                    animate={{ opacity: 1 }}
                    className="flex flex-col h-screen"
                >
                    <Header stats={stats} aiStatus={aiStatus} />
                    
                    <div className="flex flex-1 overflow-hidden">
                        <SideNav />
                        
                        <main className="flex-1 bg-surface-dim p-6 grid grid-cols-12 grid-rows-6 gap-4 overflow-hidden relative">
                            {/* Metadata */}
                            <div className="absolute top-2 right-6 text-[8px] text-primary/30 font-mono">ADDR: 0x4F22 // STACK_PTR: 00FF</div>
                            <div className="absolute bottom-10 left-6 text-[8px] text-primary/30 font-mono">FIRMWARE_VER: REV_94_12</div>

                            {/* Master Control */}
                            <section className="col-span-12 md:col-span-7 row-span-4 border border-outline-variant/40 bg-surface-container-low p-8 flex flex-col items-center justify-center relative">
                                <div className="absolute top-4 left-4 flex gap-2 items-center">
                                    <div className="w-2 h-2 bg-primary"></div>
                                    <span className="text-[10px] tracking-widest uppercase font-bold text-primary">Master Gain Module</span>
                                </div>
                                
                                <GainSlider value={gain} onChange={updateGain} />

                                <div className="mt-8 flex gap-12">
                                    <div className="flex flex-col items-center gap-2">
                                        <span className="text-[9px] text-primary/50 uppercase">Input_Trim</span>
                                        <div className="w-32 h-1 bg-surface-container-high relative">
                                            <div className="absolute inset-y-0 left-0 w-3/4 bg-primary shadow-[0_0_5px_rgba(255,191,0,0.5)]"></div>
                                        </div>
                                    </div>
                                    <div className="flex flex-col items-center gap-2">
                                        <span className="text-[9px] text-primary/50 uppercase">Output_Trim</span>
                                        <div className="w-32 h-1 bg-surface-container-high relative">
                                            <div className="absolute inset-y-0 left-0 w-1/2 bg-primary shadow-[0_0_5px_rgba(255,191,0,0.5)]"></div>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            {/* Signal Terminal */}
                            <section className="col-span-12 md:col-span-5 row-span-4 border border-outline-variant/40 bg-surface-container-lowest p-6 font-mono overflow-hidden relative">
                                <div className="absolute top-4 left-4 flex gap-2 items-center">
                                    <div className="w-2 h-2 bg-secondary animate-pulse"></div>
                                    <span className="text-[10px] tracking-widest uppercase font-bold text-secondary">Signal Analysis Terminal</span>
                                </div>
                                
                                <ConsoleWindow logs={logs} />
                                
                                <div className="h-[1px] w-full bg-secondary/20 my-4"></div>
                                
                                <div className="grid grid-cols-2 gap-4 text-[10px]">
                                    <div>
                                        <p className="text-primary/40">THD_RATIO: 0.002%</p>
                                        <p className="text-primary/40">NOISE_FLR: -96dB</p>
                                        <p className="text-primary/40">PHASE_COR: 0.992</p>
                                    </div>
                                    <div>
                                        <p className="text-secondary">WAVE_TYPE: COMPLEX</p>
                                        <p className="text-secondary">PEAK_DETECT: 0.88v</p>
                                        <p className="text-secondary">SYNC_LOCK: TRUE</p>
                                    </div>
                                </div>

                                <Visualizer />
                            </section>

                            {/* Modular Grid Bottom */}
                            <section className="col-span-12 row-span-2 grid grid-cols-4 gap-4">
                                <div className="border border-outline-variant/30 bg-surface-container-high p-4 flex flex-col justify-between">
                                    <span className="text-[9px] uppercase text-primary/40 font-bold">Resonance</span>
                                    <div className="flex items-end gap-2">
                                        <div className="text-lg font-bold text-primary">0.42</div>
                                        <div className="flex-1 h-6 bg-surface-container flex items-end gap-[1px] p-1">
                                            {[50, 66, 33, 75, 50].map((h, i) => (
                                                <div key={i} className="flex-1 bg-primary" style={{height: `${h}%`}}></div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div className="border border-outline-variant/30 bg-surface-container-high p-4 flex flex-col justify-between">
                                    <span className="text-[9px] uppercase text-primary/40 font-bold">Drive_Type</span>
                                    <div className="flex items-center justify-between text-xs font-bold text-primary">
                                        <span className="opacity-30">SOFT</span>
                                        <span className="bg-primary text-background px-2">HARD</span>
                                        <span className="opacity-30">CRUSH</span>
                                    </div>
                                </div>
                                <div className="border border-outline-variant/30 bg-surface-container-high p-4 flex flex-col justify-between">
                                    <span className="text-[9px] uppercase text-primary/40 font-bold">LFO_FREQ</span>
                                    <div className="text-lg font-bold text-primary">12.5 <span className="text-[10px] opacity-50">Hz</span></div>
                                </div>
                                <div className="border border-outline-variant/30 bg-surface-container-high p-4 flex flex-col justify-between overflow-hidden">
                                    <span className="text-[9px] uppercase text-primary/40 font-bold">Patch_Visual</span>
                                    <img 
                                        alt="patch" 
                                        className="w-full h-10 object-cover grayscale brightness-50 contrast-150" 
                                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuDdQruLKk_lCG8Efcbaoz9Bukgjoeu6WN2Q1xyoDxQ3ltN39mkvX1TCUsnwhI0zLUY_eol_NNkrZaBFIxZ81ksC5aRRJSCLUi_5cP9ozDkqKSQxVMSN2Pr8fAZrozGVIggLvT7xzwvq68RiPjTtGgtvcEtAIN3yJFIwdmcHsYHg3-c5eHYqBjo6CUUF-ucv-229GbbIs3snBJH2QmNN9a0L9dHAUmXvSnSY2EItR5h_ZeUhepiOl4rDF-bFzRx1AsoUgvZOtmiJX44"
                                    />
                                </div>
                            </section>
                        </main>
                    </div>

                    <footer className="bg-[#0e0e0f] text-[#FFBF00] font-['Space_Grotesk'] text-[9px] w-full h-8 flex items-center justify-between px-4 uppercase border-t border-[#FFBF00]/20 z-50">
                        <div className="flex items-center gap-6 overflow-hidden">
                            <div className="flex items-center gap-2">
                                <span className="text-[#FFBF00]">SYS_LOGS: READY</span>
                                <div className="w-1 h-3 bg-primary animate-pulse"></div>
                            </div>
                            <div className="flex gap-4 items-center whitespace-nowrap">
                                <span className="text-secondary">OSC_RECEIVED: CC74</span>
                                <span className="text-primary/40">DUMP_CORE: EXECUTED</span>
                                <span className="text-on-tertiary-container animate-pulse">SYSTEM_ERR: BUFFER_UNDERRUN</span>
                                <span className="text-primary/40">MIDI_IN: CH_01</span>
                                <span className="text-secondary">ENVELOPE_TRIGGERED: A_440</span>
                            </div>
